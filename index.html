<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻棱 PHANTAPRISM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #3d5afe; 
            --neon-pink: #d500f9; 
            --neon-gold: #D4AF37; 
            --bg-dark: #050a10;
            --bg-darker: #00050a;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, var(--bg-darker), var(--bg-dark));
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container { 
            text-align: center;
            max-width: 900px;
            padding: 40px;
        }
        
        header {
            margin-bottom: 36px;
        }
        
        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--neon-gold); 
            font-size: 3rem; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            margin: 0;
            font-weight: normal;
        }
        
        .subtitle {
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 15px;
            font-weight: 300;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 40px 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .card:hover {
            border-color: var(--neon-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            transform: translateY(-5px);
        }
        
        .card-title {
            font-family: 'Playfair Display', serif;
            color: var(--neon-gold);
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            font-weight: normal;
        }

        .card-desc {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
        }
        
        footer {
            margin-top: 36px;
            color: #555;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .open-order-hint {
            margin: 22px 0 0;
            font-size: 10px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.32);
            letter-spacing: 0.06em;
            font-weight: 300;
        }

        .human-panel {
            margin-top: 28px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 16px 18px;
            display: flex;
            gap: 16px;
            align-items: center;
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }
        .human-panel--active {
            border-color: rgba(212, 175, 55, 0.25);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.08);
        }
        .human-panel__face {
            flex-shrink: 0;
            width: 84px; height: 84px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .human-panel__face img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .human-panel__face-idle {
            font-size: 9px;
            color: #444;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .human-panel__label {
            font-size: 10px; letter-spacing: 0.1em;
            text-transform: uppercase; color: #555;
        }
        .human-panel--active .human-panel__label {
            color: rgba(212, 175, 55, 0.8);
        }
        @media (max-height: 700px) {
            header { margin-bottom: 24px !important; }
            .human-panel { margin-top: 16px; padding: 12px 14px; }
            .human-panel__face { width: 64px; height: 64px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>幻棱</h1>
            <div class="subtitle">PHANTAPRISM · 算法凝视的棱镜</div>
        </header>
        
        <div class="dashboard">
            <a href="sensor.html" target="_blank" class="card">
                <h3 class="card-title">镜 · Mirror</h3>
                <p class="card-desc">面部捕捉与生物特征折射，凝视的起点。</p>
            </a>

            <a href="dashboard.html" target="_blank" class="card">
                <h3 class="card-title">析 · Dissect</h3>
                <p class="card-desc">多智能体协作与算法侧写，机器的解构。</p>
            </a>

            <a href="evolution.html" target="_blank" class="card">
                <h3 class="card-title">衍 · Emergence</h3>
                <p class="card-desc">自主演化的抽象影像，棱镜折射后的衍生。</p>
            </a>
        </div>
        <p class="open-order-hint">建议首次打开顺序：镜 → 析 → 衍</p>

        <div class="human-panel" id="human-panel">
            <div class="human-panel__face" id="hp-face">
                <span class="human-panel__face-idle">待凝视</span>
            </div>
            <span class="human-panel__label" id="hp-label">被观测者 · 等待入场</span>
        </div>

        <footer>
            幻棱 PHANTAPRISM
        </footer>
    </div>

    <script>
        (function() {
            var _bootSynced = false;
            function syncBoot(d) {
                if (_bootSynced || d.server_boot_at == null) return;
                _bootSynced = true;
                var key = 'agentsart_server_boot_at';
                var cur = String(d.server_boot_at);
                if (localStorage.getItem(key) !== cur) {
                    localStorage.removeItem('agentsart_latest_capture');
                    localStorage.setItem(key, cur);
                }
            }
            function pollFaceImage() {
                fetch('/get_data?t=' + Date.now(), { cache: 'no-store' })
                    .then(function(r) { return r.ok ? r.json() : null; })
                    .then(function(d) {
                        if (!d) return;
                        syncBoot(d);
                        var panel = document.getElementById('human-panel');
                        var faceEl = document.getElementById('hp-face');
                        var labelEl = document.getElementById('hp-label');
                        if (!panel) return;
                        var cap = null;
                        try {
                            var raw = localStorage.getItem('agentsart_latest_capture');
                            cap = raw ? JSON.parse(raw) : null;
                        } catch(_) {}
                        if (cap && cap.image) {
                            faceEl.innerHTML = '<img src="' + cap.image + '" alt="" />';
                            panel.classList.add('human-panel--active');
                            labelEl.textContent = '被观测者 · 凝视中';
                        } else {
                            faceEl.innerHTML = '<span class="human-panel__face-idle">待凝视</span>';
                            panel.classList.remove('human-panel--active');
                            labelEl.textContent = '被观测者 · 等待入场';
                        }
                    })
                    .catch(function() {});
            }
            setInterval(pollFaceImage, 3000);
            pollFaceImage();
        })();
    </script>
</body>
</html>
