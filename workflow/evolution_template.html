<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻棱 · 幻</title>
    <meta name="description" content="{description}">
    <meta name="generator" content="幻棱 - Iteration {iteration}">
    <meta name="created" content="{creation_date}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: rgba(255, 255, 255, 0.85);
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        /* Subtle vignette effect */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 55%, rgba(0,0,0,0.38) 100%);
            pointer-events: none;
            z-index: 2;
        }
        .overlay {
            position: fixed;
            bottom: 40px;
            left: 40px;
            background: rgba(10, 10, 15, 0.58);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.18);
            border-left: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            padding: 35px;
            font-size: 15px;
            line-height: 1.8;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            max-width: 520px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
            opacity: 1;
            animation: slideUp 1s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            opacity: 0.5;
        }
        .overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: normal;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 14px rgba(0,0,0,0.6);
        }
        .overlay-kicker {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.85);
            margin: 0 0 8px 0;
        }
        .overlay-concept {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.65;
            font-style: italic;
            color: rgba(255, 255, 255, 0.91);
            margin: 0 0 18px 0;
            max-height: 11em;
            overflow-y: auto;
            padding-right: 6px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.85);
        }
        .overlay .desc {
            font-weight: 400;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.88);
            text-shadow: 0 2px 6px rgba(0,0,0,0.88);
        }
        .meta {
            opacity: 0.6;
            font-size: 11px;
            margin-top: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            font-weight: 600;
            color: #A8C2B5;
        }
        .iteration-badge {
            position: fixed;
            top: 40px;
            right: 40px;
            background: rgba(10, 10, 15, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 24px;
            border-radius: 30px;
            color: #d4af37;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 15px rgba(212, 175, 55, 0.1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 1s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .iteration-badge .iter-num {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            font-style: italic;
        }
        .iteration-badge .iter-style {
            opacity: 0.8;
            font-size: 13px;
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 12px;
            border-left: 1px solid rgba(212, 175, 55, 0.3);
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #eaeaea;
            font-size: 16px;
            z-index: 1000;
            letter-spacing: 2px;
            font-weight: 300;
            transition: opacity 1s ease;
        }
        .loading--boot .loading-primary { margin: 0 0 10px; font-size: 15px; letter-spacing: 0.14em; }
        .loading--boot .loading-sub {
            margin: 0;
            font-size: 11px;
            opacity: 0.52;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 400;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* Page entrance & exit transitions */
        body { animation: pageEnter 2s ease-out; }
        @keyframes pageEnter { 0% { opacity: 0; } 100% { opacity: 1; } }
        #arrival-flash {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.12), transparent 65%);
            z-index: 998; pointer-events: none;
            animation: arrivalPulse 3s ease-out forwards;
        }
        @keyframes arrivalPulse {
            0% { opacity: 1; transform: scale(0.95); }
            50% { opacity: 0.5; transform: scale(1.02); }
            100% { opacity: 0; transform: scale(1); }
        }
        #page-transition-out {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            opacity: 0; pointer-events: none; transition: opacity 0.9s ease-in;
        }
        #page-transition-out.active { opacity: 1; }
        .overlay-keywords {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 12px 0;
        }
        .overlay-keywords:empty { display: none; }
        .overlay-keywords .kw-tag {
            font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.08em;
            padding: 2px 8px; border: 1px solid rgba(212, 175, 55, 0.35);
            border-radius: 3px; color: rgba(212, 175, 55, 0.8);
        }
    </style>
    <!-- Three.js r160（npm 0.160.1，UMD three.min.js；0.161+ 仅提供 ES module 构建） -->
    <script src="/js/lib/three.min.js?v=r160-umd-1"></script>
</head>
<body>
    <div class="loading loading--boot" id="loading">
        <div class="spinner"></div>
        <div class="loading-primary">Compiling scene…</div>
        <div class="loading-sub">正在编译场景 · Shaders & WebGL</div>
    </div>
    <div id="canvas-container"></div>
    <div id="arrival-flash"></div>
    <div id="page-transition-out"></div>
    
    <div class="iteration-badge">
        <span class="iter-num">Iter {iteration}</span>
        <span class="iter-style" title="{visual_style_summary}">{visual_style_summary}</span>
    </div>
    
    <div class="overlay">
        <h1>{title}</h1>
        <p class="overlay-kicker">Creative Direction · 创意总监概念</p>
        <div class="overlay-keywords">{creative_keywords_display}</div>
        <div class="overlay-concept">{director_concept}</div>
        <div class="desc">{narrative_summary}</div>
        <div class="meta">
            幻棱 PHANTAPRISM<br>
            Autonomous Rendering<br>
            {creation_date}
        </div>
    </div>
    
    <script>
        // Auto-refresh：与页内迭代号比较；state.json 禁用缓存；支持服务端重置后迭代号回绕
        (function setupEvolutionAutoRefresh() {
           function pageIterationFromDom() {
                const gen = document.querySelector('meta[name="generator"]');
                if (gen) {
                    const m = (gen.getAttribute('content') || '').match(/Iteration\s+(\d+)/i);
                    if (m) return parseInt(m[1], 10);
                }
                const badge = document.querySelector('.iteration-badge .iter-num');
                if (badge) {
                    const m = (badge.textContent || '').match(/(\d+)/);
                    if (m) return parseInt(m[1], 10);
                }
                return {iteration};
            }
            const PAGE_ITER = pageIterationFromDom();
            let lastKnownRun = null;
            let inFlight = false;
            let _idleShown = false;
            let _fetchFailCount = 0;
            function parseStateIteration(raw) {
                const n = Math.trunc(Number(raw));
                return Number.isFinite(n) ? n : null;
            }
            function reloadPage() {
                var pto = document.getElementById('page-transition-out');
                if (pto) {
                    pto.classList.add('active');
                    setTimeout(function() {
                        window.location.href = window.location.pathname.split('?')[0] + '?t=' + Date.now();
                    }, 900);
                } else {
                    window.location.href = window.location.pathname.split('?')[0] + '?t=' + Date.now();
                }
            }
            function showIdleState() {
                if (_idleShown) return;
                _idleShown = true;
                document.querySelector('.overlay')?.style.setProperty('display', 'none');
                document.querySelector('.iteration-badge')?.style.setProperty('display', 'none');
                var loading = document.getElementById('loading');
                if (loading) {
                    loading.innerHTML = '<div class="spinner"></div><div class="loading-primary">幻棱 · 等待凝视</div><div class="loading-sub">Awaiting the First Gaze</div>';
                    loading.style.cssText = 'display:flex;opacity:1;';
                    loading.className = 'loading loading--boot';
                }
                if (!window.fallbackRendered) {
                    renderFallback();
                    window.fallbackRendered = true;
                }
                if (loading) {
                    setTimeout(function() { loading.style.opacity = '0'; setTimeout(function() { loading.style.display = 'none'; }, 1000); }, 1500);
                }
            }
            function showConnectionLost() {
                if (document.getElementById('conn-lost-overlay')) return;
                var el = document.createElement('div');
                el.id = 'conn-lost-overlay';
                el.style.cssText = 'position:fixed;inset:0;z-index:9000;background:rgba(5,2,10,0.82);display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:Inter,sans-serif;color:rgba(255,255,255,0.7);backdrop-filter:blur(8px)';
                el.innerHTML = '<div style="font-size:14px;letter-spacing:0.15em;margin-bottom:8px;color:rgba(212,175,55,0.8)">系统重启中</div><div style="font-size:11px;opacity:0.55;letter-spacing:0.12em">Reconnecting…</div>';
                document.body.appendChild(el);
            }
            function hideConnectionLost() {
                var el = document.getElementById('conn-lost-overlay');
                if (el) el.remove();
            }
            async function checkNewVersion() {
                if (inFlight) return;
                inFlight = true;
                try {
                    const url = new URL('state.json', window.location.href);
                    url.searchParams.set('t', String(Date.now()));
                    const res = await fetch(url.href, { cache: 'no-store' });
                    if (!res.ok) {
                        _fetchFailCount++;
                        if (_fetchFailCount >= 3) showConnectionLost();
                        return;
                    }
                    _fetchFailCount = 0;
                    hideConnectionLost();
                    const state = await res.json();
                    const srvIter = parseStateIteration(state.iteration);
                    const run = typeof state.last_run === 'string' ? state.last_run : '';
                    if (srvIter === null) {
                        showIdleState();
                        return;
                    }
                    if (_idleShown && srvIter !== null) {
                        reloadPage();
                        return;
                    }
                    if (srvIter !== null && PAGE_ITER !== null && srvIter !== PAGE_ITER) {
                        console.log('Evolution: iteration mismatch, reloading...');
                        reloadPage();
                        return;
                    }
                    if (srvIter !== null && PAGE_ITER === null && srvIter >= 0) {
                        console.log('Evolution: sync page from state...');
                        reloadPage();
                        return;
                    }
                    if (srvIter !== null && PAGE_ITER !== null && srvIter === PAGE_ITER && lastKnownRun != null && run && run !== lastKnownRun) {
                        console.log('Evolution: state.json updated, reloading...');
                        reloadPage();
                        return;
                    }
                    if (run) lastKnownRun = run;
                } catch (e) {
                    _fetchFailCount++;
                    if (_fetchFailCount >= 3) showConnectionLost();
                }
                finally { inFlight = false; }
            }
            setInterval(checkNewVersion, 2200);
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) void checkNewVersion();
            });
            void checkNewVersion();
        })();

        function styleLoadingRecompilingBar(showBlock) {
            var loading = document.getElementById('loading');
            if (!loading) return;
            if (showBlock) loading.style.display = 'block';
            loading.style.width = 'auto';
            loading.style.height = 'auto';
            loading.style.bottom = '24px';
            loading.style.top = 'auto';
            loading.style.left = '50%';
            loading.style.transform = 'translateX(-50%)';
            loading.style.background = 'rgba(10, 10, 18, 0.82)';
            loading.style.backdropFilter = 'blur(16px)';
            loading.style.padding = '10px 24px';
            loading.style.borderRadius = '8px';
            loading.style.border = '1px solid rgba(212, 175, 55, 0.3)';
            loading.innerHTML = '<span style="color:rgba(212,175,55,0.85);font-size:11px;letter-spacing:0.1em">幻棱 · 重构场景中</span>';
        }

        function recoveryReloadAfterGenerateError() {
            if (window.fallbackRendered) return;
            renderFallback();
            window.fallbackRendered = true;
            var errCount = parseInt(sessionStorage.getItem('agentsart_err_reload') || '0', 10);
            if (errCount < 2) {
                sessionStorage.setItem('agentsart_err_reload', String(errCount + 1));
                setTimeout(function() {
                    window.location.href = window.location.pathname.split('?')[0] + '?t=' + Date.now();
                }, 8000);
            }
        }

        // Global error capture for syntax errors
        window.addEventListener('error', function() {
            styleLoadingRecompilingBar(false);
            recoveryReloadAfterGenerateError();
        });

        window.addEventListener('load', function() {
            if (!window.fallbackRendered) {
                sessionStorage.removeItem('agentsart_err_reload');
            }
        });

        function renderFallback() {
            var ctr = document.getElementById('canvas-container');
            ctr.innerHTML = '';
            var scene = new THREE.Scene();
            scene.background = new THREE.Color().setHSL(0.62, 0.22, 0.065);
            scene.fog = new THREE.FogExp2(scene.background, 0.014);

            var cam = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 260);
            cam.position.set(0, 1.2, 46);

            var ren = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
            ren.setSize(window.innerWidth, window.innerHeight);
            ren.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            ren.toneMapping = THREE.ACESFilmicToneMapping;
            ren.toneMappingExposure = 1.45;
            ren.outputColorSpace = THREE.SRGBColorSpace;
            ctr.appendChild(ren.domElement);

            scene.add(new THREE.AmbientLight(0x2a3550, 0.55));
            var Lg = new THREE.PointLight(0xffcc66, 2.2, 120, 1.5);
            var Lc = new THREE.PointLight(0x44ddff, 1.6, 120, 1.5);
            var Lm = new THREE.PointLight(0xff66cc, 1.4, 120, 1.5);
            scene.add(Lg); scene.add(Lc); scene.add(Lm);

            var dummy = new THREE.Object3D();
            var ctmp = new THREE.Color();

            var IC = 520;
            var instGeo = new THREE.OctahedronGeometry(0.16, 0);
            var instMat = new THREE.MeshStandardMaterial({
                metalness: 0.93,
                roughness: 0.16,
                emissive: new THREE.Color(0x081830),
                emissiveIntensity: 0.5,
                vertexColors: true
            });
            var inst = new THREE.InstancedMesh(instGeo, instMat, IC);
            inst.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            var icArr = new Float32Array(IC * 3);
            inst.instanceColor = new THREE.InstancedBufferAttribute(icArr, 3);
            inst.instanceColor.setUsage(THREE.DynamicDrawUsage);
            scene.add(inst);

            var knot = new THREE.Mesh(
                new THREE.TorusKnotGeometry(2.4, 0.62, 200, 18, 2, 3),
                new THREE.MeshStandardMaterial({
                    color: new THREE.Color(0x050a14),
                    metalness: 0.9,
                    roughness: 0.2,
                    emissive: new THREE.Color(0xb8942e),
                    emissiveIntensity: 0.35
                })
            );
            scene.add(knot);

            var N = 3200;
            var pos = new Float32Array(N * 3);
            var golden = (Math.sqrt(5) + 1) / 2;
            for (var pi = 0; pi < N; pi++) {
                var th = 2 * Math.PI * pi / golden;
                var ph = Math.acos(1 - 2 * (pi + 0.5) / N);
                var rad = 16 + (Math.random() - 0.5) * 2.5;
                pos[pi * 3] = rad * Math.sin(ph) * Math.cos(th);
                pos[pi * 3 + 1] = rad * Math.sin(ph) * Math.sin(th);
                pos[pi * 3 + 2] = rad * Math.cos(ph);
            }
            var pgeo = new THREE.BufferGeometry();
            pgeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            var pmat = new THREE.PointsMaterial({
                size: 0.055,
                sizeAttenuation: true,
                color: new THREE.Color(0x66ccff),
                transparent: true,
                opacity: 0.55,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            var dust = new THREE.Points(pgeo, pmat);
            scene.add(dust);

            function makeOrbitLine(radius, segs, colorHex) {
                var arr = new Float32Array((segs + 1) * 3);
                for (var s = 0; s <= segs; s++) {
                    var a = (s / segs) * Math.PI * 2;
                    arr[s * 3] = Math.cos(a) * radius;
                    arr[s * 3 + 1] = 0;
                    arr[s * 3 + 2] = Math.sin(a) * radius;
                }
                var g = new THREE.BufferGeometry();
                g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
                var m = new THREE.LineBasicMaterial({
                    color: colorHex,
                    transparent: true,
                    opacity: 0.35
                });
                return new THREE.LineLoop(g, m);
            }
            var orbitA = makeOrbitLine(22, 128, 0xd4af37);
            orbitA.rotation.x = Math.PI * 0.52;
            var orbitB = makeOrbitLine(26, 96, 0x4488ff);
            orbitB.rotation.y = Math.PI * 0.31;
            orbitB.rotation.x = Math.PI * 0.22;
            var orbitC = makeOrbitLine(19, 80, 0xff66aa);
            orbitC.rotation.z = Math.PI * 0.41;
            scene.add(orbitA, orbitB, orbitC);

            function anim() {
                requestAnimationFrame(anim);
                var t = performance.now() * 0.001;

                var R = 9.2;
                for (var i = 0; i < IC; i++) {
                    var u = (i / IC) * Math.PI * 2 * 9 + t * 0.22;
                    var wob = 1 + 0.22 * Math.sin(u * 3.1 + t * 1.4) + 0.12 * Math.sin(i * 0.11 + t * 2.1);
                    var x = R * Math.cos(u) * wob;
                    var y = R * Math.sin(u * 0.92) * (0.65 + 0.35 * Math.sin(u * 2 + t)) + 2 * Math.sin(t * 0.8 + i * 0.04);
                    var z = 5.5 * Math.sin(u * 0.55 + t * 0.35) + 3 * Math.cos(u * 1.3 - t * 0.5);
                    dummy.position.set(x, y, z);
                    var sc = 0.55 + 0.45 * Math.sin(t * 2.2 + i * 0.19);
                    dummy.scale.setScalar(sc);
                    dummy.rotation.set(u * 0.6 + t * 0.4, u * 0.45, u * 0.33);
                    dummy.updateMatrix();
                    inst.setMatrixAt(i, dummy.matrix);
                    ctmp.setHSL(
                        0.52 + 0.18 * Math.sin(t * 0.35 + i * 0.02),
                        0.78 + 0.12 * Math.sin(t * 0.6 + u),
                        0.38 + 0.14 * Math.sin(t * 1.1 + i * 0.05)
                    );
                    inst.setColorAt(i, ctmp);
                }
                inst.instanceMatrix.needsUpdate = true;
                inst.instanceColor.needsUpdate = true;

                knot.rotation.x = t * 0.31;
                knot.rotation.y = t * 0.47;
                knot.material.emissiveIntensity = 0.28 + 0.22 * Math.sin(t * 1.8);

                dust.rotation.y = t * 0.08;
                dust.rotation.x = Math.sin(t * 0.05) * 0.12;
                pmat.color.setHSL(0.52 + 0.06 * Math.sin(t * 0.25), 0.85, 0.58);

                orbitA.rotation.z = t * 0.11;
                orbitB.rotation.z = -t * 0.085;
                orbitC.rotation.y = t * 0.13;

                var orbitR = 28;
                Lg.position.set(Math.cos(t * 0.21) * orbitR, 8 * Math.sin(t * 0.17), Math.sin(t * 0.21) * orbitR);
                Lc.position.set(Math.sin(t * 0.19) * -orbitR, -6 * Math.cos(t * 0.14), Math.cos(t * 0.19) * orbitR);
                Lm.position.set(Math.cos(t * 0.24 + 1.7) * orbitR * 0.75, 12 * Math.sin(t * 0.11), Math.sin(t * 0.24 + 1.7) * orbitR * 0.75);

                scene.fog.density = 0.012 + Math.sin(t * 0.12) * 0.003;

                cam.position.x = Math.sin(t * 0.055) * 5;
                cam.position.y = 1.2 + Math.cos(t * 0.048) * 3.5;
                cam.position.z = 46 + Math.sin(t * 0.03) * 2;
                cam.lookAt(0, 0, 0);

                ren.render(scene, cam);
            }
            anim();

            window.addEventListener('resize', function() {
                cam.aspect = window.innerWidth / window.innerHeight;
                cam.updateProjectionMatrix();
                ren.setSize(window.innerWidth, window.innerHeight);
            });
        }

        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');
            if (loading && loading.classList.contains('loading--boot')) {
                loading.style.opacity = '0';
                setTimeout(() => { loading.style.display = 'none'; }, 1000);
            }
        });
    </script>
    <script>
        // Core Three.js render code
        try {
{threejs_code}
        } catch(err) {
            console.error("Three.js Runtime Error:", err);
            styleLoadingRecompilingBar(true);
            recoveryReloadAfterGenerateError();
        }
    </script>
    <script>
        (function microDrift() {
            var driftT = 0;
            function tick() {
                driftT += 0.0006;
                var c = document.querySelector('#canvas-container canvas');
                if (!c) { requestAnimationFrame(tick); return; }
                var hue = Math.sin(driftT) * 4;
                var bright = 1.06 + Math.sin(driftT * 0.7) * 0.03;
                var sat = 1.04 + Math.sin(driftT * 0.4) * 0.05;
                c.style.filter = 'hue-rotate(' + hue.toFixed(2) + 'deg) brightness(' + bright.toFixed(4) + ') saturate(' + sat.toFixed(3) + ')';
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        })();
    </script>
</body>
</html>
